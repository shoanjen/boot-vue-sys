server:
  port: 8081

spring:
  application:
    name: boot-vue-sys
  datasource:
    url: jdbc:mysql://localhost:3306/club_mgmt?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: rootroot

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  auth:
    token-secret: boot-vue-sys-secret-change-me
    token-expire-seconds: 604800
